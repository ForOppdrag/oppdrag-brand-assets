<svg role="img" focusable="false" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <title>Oppdrag.tech — Logo carré fond clair</title>
  <desc>Brand asset for Oppdrag.Tech, optimized for web and social media use.</desc>

  <!-- Background ivoire -->
  <rect width="1000" height="1000" fill="#F2ECE0"/>

  <!-- Border accent subtile -->
  <rect x="32" y="32" width="936" height="936" fill="none" stroke="#1B232F" stroke-width="1.5" stroke-opacity="0.15"/>

  <!-- Logo icon — version avec contours ink -->
  <g transform="translate(225, 90) scale(5.5)">
    <circle cx="50" cy="84" r="22" fill="none" stroke="#1B232F" stroke-width="17"/>
    <circle cx="50" cy="84" r="22" fill="none" stroke="#C16A3E" stroke-width="12"/>
    <path d="M31 55 C31 38 35 27 41 27 C45 27 47 31 50 31 C53 31 55 27 59 27 C65 27 69 38 69 55 Z"
          fill="#C16A3E" stroke="#1B232F" stroke-width="3" stroke-linejoin="round"/>
    <ellipse cx="50" cy="56" rx="40" ry="8" fill="#C16A3E" stroke="#1B232F" stroke-width="3"/>
    <rect x="30" y="44" width="40" height="6" rx="2" fill="#1B232F"/>
    <rect x="45.5" y="43" width="9" height="8" rx="1.5" fill="#C16A3E" stroke="#1B232F" stroke-width="1.4"/>
  </g>

  <!-- Separator -->
  <line x1="200" y1="760" x2="800" y2="760" stroke="#1B232F" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Company name -->
  <text x="500" y="840" text-anchor="middle"
        font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="110" letter-spacing="-2" fill="#1B232F">OPPDRAG</text>

  <!-- .tech -->
  <text x="500" y="916" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="300" letter-spacing="14" fill="#C16A3E">.TECH</text>

  <!-- Tagline -->
  <text x="500" y="968" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="400" letter-spacing="2" fill="#1B232F" opacity="0.45">IA · DATA · CYBERSÉCURITÉ</text>
</svg>

