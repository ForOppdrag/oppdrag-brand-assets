<svg role="img" focusable="false" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2480 220" width="2480" height="220">
  <title>Oppdrag.tech — En-tête document officiel</title>
  <desc>Brand asset for Oppdrag.Tech, optimized for web and social media use.</desc>

  <!-- Background ivoire -->
  <rect width="2480" height="220" fill="#F2ECE0"/>

  <!-- Copper accent bar top -->
  <rect x="0" y="0" width="2480" height="5" fill="#C16A3E"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="220" fill="#C16A3E"/>

  <!-- Logo icon — compact, left side -->
  <!-- Scale 1.55: 100*1.55=155 wide, 116*1.55=180 tall -->
  <!-- translateY = (220-180)/2 = 20 -->
  <g transform="translate(30, 20) scale(1.55)">
    <circle cx="50" cy="84" r="22" fill="none" stroke="#1B232F" stroke-width="17"/>
    <circle cx="50" cy="84" r="22" fill="none" stroke="#C16A3E" stroke-width="12"/>
    <path d="M31 55 C31 38 35 27 41 27 C45 27 47 31 50 31 C53 31 55 27 59 27 C65 27 69 38 69 55 Z"
          fill="#C16A3E" stroke="#1B232F" stroke-width="3" stroke-linejoin="round"/>
    <ellipse cx="50" cy="56" rx="40" ry="8" fill="#C16A3E" stroke="#1B232F" stroke-width="3"/>
    <rect x="30" y="44" width="40" height="6" rx="2" fill="#1B232F"/>
    <rect x="45.5" y="43" width="9" height="8" rx="1.5" fill="#C16A3E" stroke="#1B232F" stroke-width="1.4"/>
  </g>

  <!-- Company name -->
  <text x="210" y="116" dominant-baseline="middle"
        font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="72" letter-spacing="-1" fill="#1B232F">OPPDRAG<tspan fill="#C16A3E" font-size="52" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="300" letter-spacing="6">.tech</tspan></text>

  <!-- Tagline under name -->
  <text x="212" y="162" dominant-baseline="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="300" letter-spacing="2" fill="#1B232F" opacity="0.45">Le standard opérationnel des missions techniques</text>

  <!-- Vertical divider -->
  <line x1="860" y1="30" x2="860" y2="190" stroke="#1B232F" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- Right: contact info block -->
  <text x="2450" y="80" text-anchor="end"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="24" font-weight="600" fill="#1B232F">oppdrag.tech</text>
  <text x="2450" y="116" text-anchor="end"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="300" fill="#1B232F" opacity="0.6">contact@oppdrag.tech</text>
  <text x="2450" y="152" text-anchor="end"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="300" fill="#1B232F" opacity="0.45">France</text>

  <!-- Bottom separator line -->
  <rect x="0" y="215" width="2480" height="2" fill="#1B232F" opacity="0.12"/>
  <rect x="0" y="215" width="200" height="2" fill="#C16A3E" opacity="0.6"/>
</svg>

