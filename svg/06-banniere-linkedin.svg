<svg role="img" focusable="false" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <title>Oppdrag.tech — Bannière LinkedIn</title>
  <desc>Brand asset for Oppdrag.Tech, optimized for web and social media use.</desc>
  <defs>
    <pattern id="grid-ln" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="rgba(54,197,208,0.055)" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="fade-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A111F" stop-opacity="1"/>
      <stop offset="60%" stop-color="#0A111F" stop-opacity="1"/>
      <stop offset="100%" stop-color="#121821" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="glow-left" cx="20%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#C16A3E" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#C16A3E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="85%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#36C5D0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#36C5D0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#fade-right)"/>
  <rect width="1584" height="396" fill="url(#grid-ln)"/>
  <rect width="1584" height="396" fill="url(#glow-left)"/>
  <rect width="1584" height="396" fill="url(#glow-right)"/>

  <!-- Bottom copper line -->
  <rect x="0" y="390" width="1584" height="6" fill="#C16A3E"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="396" fill="#C16A3E"/>

  <!-- Diagonal decorative line -->
  <line x1="680" y1="0" x2="560" y2="396" stroke="#C16A3E" stroke-width="0.8" stroke-opacity="0.15"/>
  <line x1="740" y1="0" x2="620" y2="396" stroke="#36C5D0" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- Logo icon — left section -->
  <!-- Scale 2.4: logo 240×278, centered vertically at (396-278)/2=59 -->
  <g transform="translate(50, 59) scale(2.4)">
    <circle cx="50" cy="84" r="22" fill="none" stroke="#C16A3E" stroke-width="12.5"/>
    <path d="M31 55 C31 38 35 27 41 27 C45 27 47 31 50 31 C53 31 55 27 59 27 C65 27 69 38 69 55 Z" fill="#C16A3E"/>
    <ellipse cx="50" cy="56" rx="40" ry="8" fill="#C16A3E"/>
    <rect x="30" y="44" width="40" height="6" rx="2" fill="#0A111F"/>
    <rect x="45.5" y="43" width="9" height="8" rx="1.5" fill="#F2ECE0"/>
  </g>

  <!-- Company name — center left -->
  <text x="350" y="172" dominant-baseline="middle"
        font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="100" letter-spacing="-2" fill="#F2ECE0">OPPDRAG</text>
  <text x="351" y="252" dominant-baseline="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="40" font-weight="300" letter-spacing="10" fill="#C16A3E">.TECH</text>

  <!-- Vertical divider -->
  <line x1="790" y1="50" x2="790" y2="346" stroke="#CDB592" stroke-width="0.8" stroke-opacity="0.25"/>

  <!-- Right section: tagline + expertise -->
  <text x="840" y="140"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="300" fill="#F2ECE0" opacity="0.9">Le standard opérationnel</text>
  <text x="840" y="178"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="300" fill="#F2ECE0" opacity="0.9">des missions techniques</text>

  <!-- Expertise chips -->
  <!-- IA -->
  <rect x="840" y="212" width="80" height="34" rx="4" fill="none" stroke="#36C5D0" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="880" y="234" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="600" letter-spacing="1" fill="#36C5D0">IA</text>

  <!-- DATA -->
  <rect x="934" y="212" width="90" height="34" rx="4" fill="none" stroke="#36C5D0" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="979" y="234" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="600" letter-spacing="1" fill="#36C5D0">DATA</text>

  <!-- CYBER -->
  <rect x="1038" y="212" width="102" height="34" rx="4" fill="none" stroke="#36C5D0" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="1089" y="234" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="600" letter-spacing="1" fill="#36C5D0">CYBER</text>

  <!-- URL + deploy tagline -->
  <text x="840" y="300"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="20" font-weight="400" letter-spacing="1" fill="#CDB592" opacity="0.7">Experts mobilisables sous 5 jours</text>
  <text x="840" y="336"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="20" font-weight="600" letter-spacing="2" fill="#C16A3E">oppdrag.tech</text>
</svg>

