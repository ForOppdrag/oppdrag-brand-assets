<svg role="img" focusable="false" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400">
  <title>Oppdrag.tech — Logo horizontal fond sombre</title>
  <desc>Brand asset for Oppdrag.Tech, optimized for web and social media use.</desc>
  <defs>
    <pattern id="grid-h" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(54,197,208,0.05)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="400" fill="#0A111F"/>
  <rect width="1600" height="400" fill="url(#grid-h)"/>

  <!-- Copper left accent bar -->
  <rect x="0" y="0" width="6" height="400" fill="#C16A3E"/>

  <!-- Logo icon — scale 3, left side -->
  <!-- translateX = 80, translateY = (400 - 116*3) / 2 = (400-348)/2 = 26 -->
  <g transform="translate(80, 26) scale(3)">
    <circle cx="50" cy="84" r="22" fill="none" stroke="#C16A3E" stroke-width="12.5"/>
    <path d="M31 55 C31 38 35 27 41 27 C45 27 47 31 50 31 C53 31 55 27 59 27 C65 27 69 38 69 55 Z" fill="#C16A3E"/>
    <ellipse cx="50" cy="56" rx="40" ry="8" fill="#C16A3E"/>
    <rect x="30" y="44" width="40" height="6" rx="2" fill="#0A111F"/>
    <rect x="45.5" y="43" width="9" height="8" rx="1.5" fill="#F2ECE0"/>
  </g>

  <!-- Vertical divider -->
  <line x1="440" y1="60" x2="440" y2="340" stroke="#C16A3E" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Company name block -->
  <text x="490" y="210" dominant-baseline="middle"
        font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="128" letter-spacing="-3" fill="#F2ECE0">OPPDRAG</text>
  <text x="491" y="286" dominant-baseline="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="46" font-weight="300" letter-spacing="12" fill="#C16A3E">.TECH</text>

  <!-- Right: tagline -->
  <text x="1550" y="185" text-anchor="end"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="30" font-weight="300" letter-spacing="1" fill="#F2ECE0" opacity="0.85">Le standard opérationnel</text>
  <text x="1550" y="228" text-anchor="end"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="30" font-weight="300" letter-spacing="1" fill="#F2ECE0" opacity="0.85">des missions techniques</text>
  <text x="1550" y="290" text-anchor="end"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="400" letter-spacing="3" fill="#CDB592" opacity="0.65">IA · DATA · CYBERSÉCURITÉ</text>
</svg>

