<svg role="img" focusable="false" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Oppdrag.tech — Bannière réseaux sociaux (1200×630)</title>
  <desc>Brand asset for Oppdrag.Tech, optimized for web and social media use.</desc>
  <defs>
    <pattern id="grid-sm" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(54,197,208,0.06)" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C16A3E" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#0A111F" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A111F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A111F"/>
  <rect width="1200" height="630" fill="url(#grid-sm)"/>
  <rect width="1200" height="630" fill="url(#center-glow)"/>

  <!-- Corner accents -->
  <line x1="0" y1="0" x2="120" y2="0" stroke="#C16A3E" stroke-width="3"/>
  <line x1="0" y1="0" x2="0" y2="80" stroke="#C16A3E" stroke-width="3"/>
  <line x1="1200" y1="0" x2="1080" y2="0" stroke="#C16A3E" stroke-width="3"/>
  <line x1="1200" y1="0" x2="1200" y2="80" stroke="#C16A3E" stroke-width="3"/>
  <line x1="0" y1="630" x2="120" y2="630" stroke="#C16A3E" stroke-width="3"/>
  <line x1="0" y1="630" x2="0" y2="550" stroke="#C16A3E" stroke-width="3"/>
  <line x1="1200" y1="630" x2="1080" y2="630" stroke="#C16A3E" stroke-width="3"/>
  <line x1="1200" y1="630" x2="1200" y2="550" stroke="#C16A3E" stroke-width="3"/>

  <!-- Logo icon — large, centered -->
  <!-- Scale 4: 100*4=400 wide, 116*4=464 tall -->
  <!-- Center: translateX = (1200-400)/2 = 400, translateY = 30 -->
  <g transform="translate(400, 30) scale(4)">
    <circle cx="50" cy="84" r="22" fill="none" stroke="#C16A3E" stroke-width="12.5"/>
    <path d="M31 55 C31 38 35 27 41 27 C45 27 47 31 50 31 C53 31 55 27 59 27 C65 27 69 38 69 55 Z" fill="#C16A3E"/>
    <ellipse cx="50" cy="56" rx="40" ry="8" fill="#C16A3E"/>
    <rect x="30" y="44" width="40" height="6" rx="2" fill="#0A111F"/>
    <rect x="45.5" y="43" width="9" height="8" rx="1.5" fill="#F2ECE0"/>
  </g>

  <!-- Horizontal rule -->
  <line x1="300" y1="496" x2="900" y2="496" stroke="#C16A3E" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Company name -->
  <text x="600" y="562" text-anchor="middle"
        font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="96" letter-spacing="-2" fill="#F2ECE0">OPPDRAG<tspan fill="#C16A3E">.TECH</tspan></text>

  <!-- Tagline -->
  <text x="600" y="610" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="300" letter-spacing="4" fill="#CDB592" opacity="0.7">IA · DATA · CYBERSÉCURITÉ — FRANCE</text>
</svg>

