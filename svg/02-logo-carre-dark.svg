<svg role="img" focusable="false" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <title>Oppdrag.tech — Logo carré fond sombre</title>
  <desc>Brand asset for Oppdrag.Tech, optimized for web and social media use.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(54,197,208,0.06)" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="glow-copper" cx="50%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#C16A3E" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C16A3E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1000" fill="#0A111F"/>
  <rect width="1000" height="1000" fill="url(#grid)"/>
  <rect width="1000" height="1000" fill="url(#glow-copper)"/>

  <!-- Border accent -->
  <rect x="32" y="32" width="936" height="936" fill="none" stroke="#C16A3E" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Logo icon — centered horizontally, upper half -->
  <!-- Scale 5.5 from original 100x116, centered at x=500 -->
  <!-- translateX = 500 - 50*5.5 = 225, translateY = 100 -->
  <g transform="translate(225, 90) scale(5.5)">
    <circle cx="50" cy="84" r="22" fill="none" stroke="#C16A3E" stroke-width="12.5"/>
    <path d="M31 55 C31 38 35 27 41 27 C45 27 47 31 50 31 C53 31 55 27 59 27 C65 27 69 38 69 55 Z" fill="#C16A3E"/>
    <ellipse cx="50" cy="56" rx="40" ry="8" fill="#C16A3E"/>
    <rect x="30" y="44" width="40" height="6" rx="2" fill="#0A111F"/>
    <rect x="45.5" y="43" width="9" height="8" rx="1.5" fill="#F2ECE0"/>
  </g>

  <!-- Separator line -->
  <line x1="200" y1="760" x2="800" y2="760" stroke="#C16A3E" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Company name -->
  <text x="500" y="840" text-anchor="middle"
        font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="110" letter-spacing="-2" fill="#F2ECE0">OPPDRAG</text>

  <!-- .tech -->
  <text x="500" y="916" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="300" letter-spacing="14" fill="#C16A3E">.TECH</text>

  <!-- Tagline -->
  <text x="500" y="968" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="400" letter-spacing="2" fill="#CDB592" opacity="0.7">IA · DATA · CYBERSÉCURITÉ</text>
</svg>

